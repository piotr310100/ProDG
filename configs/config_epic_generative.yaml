defaults:
  - _self_
  - config_base

hydra:
  run:
    dir: ${output_path}/train_flux_epic

exp:
  run_func:
    _target_: experiments.epic_generative.run_epic_generative

generative_model:
  model_id: "black-forest-labs/FLUX.1-schnell"

training:
  steps: 2000
  batch_size: 4
  lr: 0.001
  gen_steps: 20
  purity_guidance_scale: 10.0

explanations:
  top_k: 4

visualization:
  num_explanations: 5
  num_prototypes: 5